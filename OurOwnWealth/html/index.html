<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OurOwnWealth - 投资记账工具</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <img src="../image/oow.png" alt="OurOwnWealth" class="brand-mark brand-logo" />
        <div class="brand-text">
          <h1>OurOwnWealth</h1>
          <p>简单清晰的资产配置可视化</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="resetButton" class="ghost-button" type="button">清空本次输入</button>
      </div>
    </header>

    <main class="app-main">
      <section class="card inputs-card">
        <div class="card-header">
          <h2>资产项目与金额</h2>
          <p>输入你当前各类资产的估值（任意货币单位），数据仅在浏览器本地临时计算，不会被保存。</p>
        </div>

        <form id="assetForm" class="asset-form">
          <div class="asset-list" id="assetList">
            <!-- 资产项目行由 JS 注入 -->
          </div>

          <div class="asset-summary">
            <div class="summary-item">
              <span class="summary-label">总资产</span>
              <span class="summary-value"><span id="totalAmount">0</span></span>
            </div>
            <div class="summary-item">
              <span class="summary-label">基准货币</span>
              <select id="baseCurrencySelect" class="unit-select">
                <option value="CNY">人民币 (CNY)</option>
                <option value="USD">美元 (USD)</option>
                <option value="EUR">欧元 (EUR)</option>
                <option value="JPY">日元 (JPY)</option>
                <option value="HKD">港币 (HKD)</option>
              </select>
            </div>
          </div>

          <div class="custom-asset">
            <h3>自定义资产项目</h3>
            <div class="custom-row">
              <input
                type="text"
                id="customName"
                class="input"
                placeholder="例如：房产、公募基金、私募股权等"
                autocomplete="off"
              />
              <button id="addCustomButton" type="button" class="primary-button">
                添加项目
              </button>
            </div>
            <p class="helper-text">自定义项目只在当前页面会话中生效，刷新后会消失。</p>
          </div>
        </form>
      </section>

      <section class="card chart-card">
        <div class="card-header chart-header">
          <div>
            <h2>资产占比图表</h2>
            <p>根据你输入的金额实时生成资产构成占比图。</p>
          </div>
          <div class="chart-actions">
            <button id="downloadChartButton" type="button" class="primary-button">
              下载图表 PNG
            </button>
          </div>
        </div>

        <div id="chartDownloadArea">
          <div class="chart-container">
            <canvas id="assetChart" aria-label="资产占比图表" role="img"></canvas>
          </div>

          <div class="table-container">
            <table class="asset-table">
              <thead>
                <tr>
                  <th>资产项目</th>
                  <th>金额 / 单位</th>
                  <th>占比</th>
                </tr>
              </thead>
              <tbody id="assetTableBody">
                <!-- 数据行由 JS 注入 -->
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>OurOwnWealth · 仅在本地浏览器中进行计算，不做任何形式的数据持久化或上传。</p>
      <p>汇率与货币换算基于 Frankfurter Open API（欧洲央行公开数据），仅供参考，不构成任何投资建议。</p>
    </footer>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
